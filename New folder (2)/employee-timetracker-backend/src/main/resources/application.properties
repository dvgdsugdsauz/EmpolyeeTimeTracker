# Server
server.port=8081
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.directory=C:/Temp
server.tomcat.accesslog.prefix=access
server.tomcat.accesslog.suffix=.log
server.tomcat.accesslog.pattern=%h %t "%r" %s %b

# PostgreSQL
spring.datasource.url=jdbc:postgresql://192.168.1.104:5432/attendance_system
spring.datasource.username=attendance_admin
spring.datasource.password=Nikitha@23
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Init schema on first run (set to always for first startup, then change to never)
spring.sql.init.mode=never

# JWT
app.jwt.secret=W1L0TUS_S3CR3T_K3Y_3MPL0Y33_T1M3TR4CK3R_2024_WILOTUS

# Jackson — serialize dates as ISO strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false
app.jwt.expiration-ms=86400000

# Scheduling
spring.task.scheduling.pool.size=5

# CORS — React dev server
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://192.168.1.104

# Biometric device TCP poll interval — connect to device and download logs
app.biometric.poll-interval-ms=60000

# ZKTeco/eSSL communication password (leave empty if none is set on device)
app.biometric.device-password=0000

# Device pulls logs via TCP — no ADMS push needed

# Miss-punch threshold (milliseconds): 2 hours
app.attendance.miss-punch-threshold-ms=7200000

# Office target hours (milliseconds): 9.5 hours
app.attendance.target-hours-ms=34200000

# Late thresholds (HH:mm)
app.attendance.late-after=09:15
app.attendance.very-late-after=10:00

# Lunch window
app.attendance.lunch-start=12:45
app.attendance.lunch-end=14:00

# Weekend days (comma-separated: 6=Saturday, 7=Sunday — ISO DayOfWeek)
app.attendance.weekend-days=6,7
